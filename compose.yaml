services:
  client-gateway:
    build: ./client-gateway
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./client-gateway/src:/app/src
    command: pnpm start:dev
    env_file:
      - ./client-gateway/.env
    environment:
      - NATS_SERVERS=nats://nats-server:4222
      - CHOKIDAR_USEPOLLING=true

  nats-server:
    image: nats:latest
    restart: unless-stopped
    ports:
      - 8222:8222

  products-ms:
    build: ./products-microservice
    restart: unless-stopped
    volumes:
      - ./products-microservice/src:/app/src
    command: pnpm docker:dev
    env_file:
      - ./products-microservice/.env
    environment:
      - NATS_SERVERS=nats://nats-server:4222
      - CHOKIDAR_USEPOLLING=true

  orders-ms:
    build: ./orders-microservice
    restart: unless-stopped
    depends_on:
      orders-db:
        condition: service_healthy
    volumes:
      - ./orders-microservice/src:/app/src
    command: pnpm docker:dev
    env_file:
      - ./orders-microservice/.env
    environment:
      - NATS_SERVERS=nats://nats-server:4222
      - DATABASE_URL=postgresql://postgres:postgres@orders-db:5432/orders_db?schema=public
      - CHOKIDAR_USEPOLLING=true

  orders-db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - ./orders-microservice/postgres:/var/lib/postgresql
    ports:
      - 5435:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payments-ms:
    build: ./payments-microservice
    restart: unless-stopped
    volumes:
      - ./payments-microservice/src:/app/src
    command: pnpm start:dev
    ports:
      - 3003:3003
    env_file:
      - ./payments-microservice/.env
    environment:
      - NATS_SERVERS=nats://nats-server:4222
      - CHOKIDAR_USEPOLLING=true

  auth-ms:
    build: ./auth-microservice
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    volumes:
      - ./auth-microservice/src:/app/src
    command: pnpm docker:dev
    env_file:
      - ./auth-microservice/.env
    environment:
      - NATS_SERVERS=nats://nats-server:4222
      - DATABASE_URL=mongodb://auth-db:27017/auth_db?directConnection=true
      - CHOKIDAR_USEPOLLING=true

  auth-db:
    image: mongo:8.0
    restart: unless-stopped
    volumes:
      - auth-mongo-data:/data/db
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_DATABASE: auth_db
    command: mongod --quiet --replSet rs0
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status() } catch(e) { rs.initiate() }"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  auth-mongo-data:
